<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — الصفحة غير موجودة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#0a0f1a;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Sans Arabic',sans-serif;color:#fff;text-align:center;padding:24px}
.num{font-size:120px;font-weight:700;line-height:1;background:linear-gradient(135deg,#0070f2,#00a5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
h1{font-size:24px;font-weight:600;margin:16px 0 8px}
p{color:rgba(255,255,255,.5);font-size:15px;margin-bottom:32px}
a{background:#0070f2;color:#fff;text-decoration:none;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:600;transition:.15s}
a:hover{background:#0057c2}
</style>
</head>
<body>
<div>
  <div class="num">404</div>
  <h1>الصفحة غير موجودة</h1>
  <p>رمز المؤسسة غير صحيح أو الصفحة المطلوبة غير موجودة</p>
  <a href="/">العودة للرئيسية</a>
</div>
</body>
</html>
