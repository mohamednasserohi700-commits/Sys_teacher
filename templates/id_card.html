<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بطاقة الطالب — {{ student.name }}</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'IBM Plex Sans Arabic',sans-serif}
body{background:#f2f3f5;padding:32px;display:flex;flex-direction:column;align-items:center;gap:16px}
.card{
  width:340px;border-radius:14px;overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.12);background:#fff;border:1px solid #d9dadb;
}
.card-head{
  background:linear-gradient(135deg,#0070f2,#0057c2);color:#fff;padding:16px 18px;
}
.card-head .org{font-size:12px;opacity:.85}
.card-head .title{font-size:16px;font-weight:700;margin-top:2px}
.card-body{padding:18px}
.name{font-size:18px;font-weight:700;color:#32363a}
.meta{font-size:13px;color:#6a6d70;margin-top:4px;line-height:1.8}
.barcode-wrap{margin-top:14px;text-align:center;background:#fafbfc;border:1px dashed #d9dadb;border-radius:8px;padding:10px}
.barcode-wrap img{max-width:100%}
.code-text{font-size:11px;color:#6a6d70;margin-top:4px;letter-spacing:.05em}
.print-btn{
  padding:10px 20px;border-radius:8px;border:none;background:#0070f2;color:#fff;
  font-size:14px;font-weight:600;cursor:pointer;
}
@media print{
  body{background:#fff;padding:0}
  .print-btn{display:none}
}
</style>
</head>
<body>
  <div class="card">
    <div class="card-head">
      <div class="org">بطاقة تعريف الطالب</div>
      <div class="title">{{ student.grade }}{% if student.group_name %} — {{ student.group_name }}{% endif %}</div>
    </div>
    <div class="card-body">
      <div class="name">{{ student.name }}</div>
      <div class="meta">
        {% if student.parent_phone %}جوال ولي الأمر: {{ student.parent_phone }}<br>{% endif %}
        الفصل الدراسي: {{ student.semester }}
      </div>
      <div class="barcode-wrap">
        <img src="/org/{{ slug }}/students/{{ student.id }}/barcode.svg" alt="barcode">
        <div class="code-text">{{ student.barcode }}</div>
      </div>
    </div>
  </div>
  <button class="print-btn" onclick="window.print()">🖨 طباعة البطاقة</button>
</body>
</html>
